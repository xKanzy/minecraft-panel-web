<!DOCTYPE html>
<html lang="{{ session.get('lang', 'en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ _('Minecraft Server Panel') }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Favicon (замените на свою иконку) -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/icon.png') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <!-- Иконка в меню (можно заменить на картинку) -->
                <img src="{{ url_for('static', filename='img/icon.png') }}" alt="logo" height="32" class="d-inline-block align-text-top me-2" style="border-radius: 8px;">
                {{ _('Minecraft Server Panel') }}
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">{{ _('Dashboard') }}</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('console') }}">{{ _('Console') }}</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('players') }}">{{ _('Players') }}</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('plugins') }}">{{ _('Plugins') }}</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('modrinth') }}">{{ _('Modrinth') }}</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('backups') }}">{{ _('Backups') }}</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('stats') }}">{{ _('Statistics') }}</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('settings') }}">{{ _('Settings') }}</a></li>
                </ul>
                <div class="language-switcher">
                    <a href="{{ url_for('set_language', lang='en') }}" class="btn btn-sm btn-outline-light me-1">EN</a>
                    <a href="{{ url_for('set_language', lang='ru') }}" class="btn btn-sm btn-outline-light">RU</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
