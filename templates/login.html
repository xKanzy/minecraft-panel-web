<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ _('Login') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            background: rgba(30,30,46,0.95);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .form-label {
            color: #f0f0f0 !important;
        }
        .form-control {
            background: rgba(0,0,0,0.6) !important;
            border: 1px solid #4caf50 !important;
            color: #ffffff !important;
        }
        .form-control:focus {
            background: rgba(0,0,0,0.8) !important;
            border-color: #7cdf4c !important;
            box-shadow: 0 0 0 0.2rem rgba(76,175,80,0.25) !important;
            color: #fff !important;
        }
        .btn-primary {
            background: #4caf50 !important;
            border: none !important;
            width: 100%;
            color: #fff !important;
        }
        .btn-primary:hover {
            background: #2e7d32 !important;
        }
        .alert {
            background: rgba(244,67,54,0.2);
            border: 1px solid #f44336;
            color: #ff8a7a;
        }
        .btn-outline-light {
            color: #fff;
            border-color: #fff;
        }
        .btn-outline-light:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="text-center mb-4 text-white">{{ _('Admin Login') }}</h2>
        <!-- Переключатель языка -->
        <div class="text-center mb-3">
            <a href="{{ url_for('set_language', lang='en') }}" class="btn btn-sm btn-outline-light me-1">EN</a>
            <a href="{{ url_for('set_language', lang='ru') }}" class="btn btn-sm btn-outline-light">RU</a>
        </div>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">{{ _('Username') }}</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">{{ _('Password') }}</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">{{ _('Login') }}</button>
            <p class="mt-3 text-center">{{ _('Don\'t have an account?') }} <a href="{{ url_for('register') }}">{{ _('Register') }}</a></p>
        </form>
    </div>
</body>
</html>
