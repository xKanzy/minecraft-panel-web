{% extends "base.html" %}

{% block content %}
<h1>{{ _('Plugins') }}</h1>

<div class="row">
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header">
                {{ _('Installed Plugins') }}
            </div>
            <div class="card-body">
                <form id="uploadForm" enctype="multipart/form-data" class="mb-3">
                    <div class="input-group">
                        <input type="file" id="pluginFile" class="form-control" accept=".jar">
                        <button type="submit" class="btn btn-primary">{{ _('Upload') }}</button>
                    </div>
                </form>
                <ul id="pluginsList" class="list-group">
                    <li class="list-group-item">{{ _('Loading...') }}</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header">
                {{ _('Modrinth & CurseForge') }}
            </div>
            <div class="card-body">
                <div class="row g-2 mb-3">
                    <div class="col-md-7">
                        <input type="text" id="searchInput" class="form-control" placeholder="{{ _('Search for plugins...') }}">
                    </div>
                    <div class="col-md-5">
                        <input type="text" id="versionInput" class="form-control" placeholder="{{ _('Minecraft version (e.g., 1.20.4)') }}">
                    </div>
                    <div class="col-12 mt-2">
                        <button id="searchBtn" class="btn btn-primary w-100">{{ _('Search') }}</button>
                    </div>
                </div>
                <div id="modrinthResults" class="row"></div>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 text-center text-muted">
    <small>
        {{ _('Powered by') }} <a href="https://modrinth.com" target="_blank">Modrinth API</a> & <a href="https://www.curseforge.com" target="_blank">CurseForge API</a>
    </small>
</footer>

<script>
    let installedProjects = [];

    function loadPlugins() {
        fetch('/api/plugins')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('pluginsList');
                list.innerHTML = '';
                if (data.plugins.length === 0) {
                    list.innerHTML = '<li class="list-group-item">{{ _("No plugins installed.") }}</li>';
                } else {
                    data.plugins.forEach(plugin => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item d-flex justify-content-between align-items-center';
                        li.innerHTML = `
                            <span>${escapeHtml(plugin.name)} (${(plugin.size / 1024).toFixed(1)} KB)</span>
                            <button class="btn btn-sm btn-danger" onclick="deletePlugin('${plugin.name}')">{{ _('Delete') }}</button>
                        `;
                        list.appendChild(li);
                    });
                }
            });
    }

    function deletePlugin(name) {
        if (confirm('{{ _("Are you sure you want to delete this plugin?") }}')) {
            fetch(`/api/plugins/delete/${name}`, {method: 'DELETE'})
                .then(() => loadPlugins());
        }
    }

    document.getElementById('uploadForm').onsubmit = (e) => {
        e.preventDefault();
        const fileInput = document.getElementById('pluginFile');
        const file = fileInput.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        fetch('/api/plugins/upload', {method: 'POST', body: formData})
            .then(res => res.json())
            .then(data => {
                if (data.status === 'uploaded') {
                    alert('{{ _("Plugin uploaded successfully") }}');
                    fileInput.value = '';
                    loadPlugins();
                } else {
                    alert('{{ _("Upload failed") }}');
                }
            });
    };

    function loadInstalled() {
        return fetch('/api/modrinth/installed')
            .then(res => res.json())
            .then(data => { installedProjects = data.installed; });
    }

    function searchPlugins() {
        const query = document.getElementById('searchInput').value;
        const version = document.getElementById('versionInput').value;
        if (!query) return;
        localStorage.setItem('modrinth_last_query', query);
        localStorage.setItem('modrinth_last_version', version);
        let url = `/api/modrinth/search?q=${encodeURIComponent(query)}`;
        if (version) url += `&version=${encodeURIComponent(version)}`;
        fetch(url)
            .then(res => res.json())
            .then(data => {
                const resultsDiv = document.getElementById('modrinthResults');
                if (data.error) {
                    resultsDiv.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                    return;
                }
                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="alert alert-info">{{ _("No plugins found.") }}</div>';
                    return;
                }
                let html = '';
                for (const plugin of data.results) {
                    const isInstalled = installedProjects.includes(plugin.id);
                    const iconHtml = plugin.icon_url
                        ? `<img src="${plugin.icon_url}" alt="${plugin.title}" style="width:48px; height:48px; object-fit:cover; border-radius:8px;" class="me-3">`
                        : '<div class="me-3" style="width:48px; height:48px; background:#6c757d; border-radius:8px;"></div>';
                    const versionsHtml = plugin.versions.length
                        ? `<small class="text-muted">{{ _("Versions:") }} ${plugin.versions.join(', ')}</small>`
                        : '<small class="text-muted">{{ _("No version info") }}</small>';
                    let buttonHtml;
                    if (isInstalled) {
                        buttonHtml = `<span class="badge bg-success mt-2">{{ _("Installed") }}</span>`;
                    } else {
                        if (plugin.source === 'curseforge') {
                            buttonHtml = `<button class="btn btn-sm btn-success mt-2" onclick="downloadCurseForgePlugin('${plugin.id}')">{{ _('Download') }}</button>`;
                        } else {
                            buttonHtml = `<button class="btn btn-sm btn-success mt-2" onclick="downloadModrinthPlugin('${plugin.id}')">{{ _('Download') }}</button>`;
                        }
                    }
                    const sourceBadge = plugin.source === 'curseforge'
                        ? '<span class="badge bg-secondary ms-2">CurseForge</span>'
                        : '<span class="badge bg-info ms-2">Modrinth</span>';
                    html += `
                        <div class="col-md-12 mb-3">
                            <div class="card h-100">
                                <div class="card-body d-flex">
                                    ${iconHtml}
                                    <div style="flex:1">
                                        <h5 class="card-title">${escapeHtml(plugin.title)} ${sourceBadge}</h5>
                                        <p class="card-text">${escapeHtml(plugin.description.substring(0, 100))}...</p>
                                        <p class="card-text"><small class="text-muted">Downloads: ${plugin.downloads}</small></p>
                                        ${versionsHtml}
                                        ${buttonHtml}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                resultsDiv.innerHTML = html;
            });
    }

    function downloadModrinthPlugin(projectId) {
        fetch(`/api/modrinth/download/${projectId}`, {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.error) alert(data.error);
                else {
                    alert(`{{ _("Plugin downloaded:") }} ${data.filename}`);
                    loadInstalled().then(() => searchPlugins());
                    loadPlugins();
                }
            });
    }

    function downloadCurseForgePlugin(modId) {
        fetch(`/api/curseforge/download/${modId}`, {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if (data.error) alert(data.error);
                else {
                    alert(`{{ _("Plugin downloaded:") }} ${data.filename}`);
                    loadInstalled().then(() => searchPlugins());
                    loadPlugins();
                }
            });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    loadPlugins();
    loadInstalled().then(() => {
        const savedQuery = localStorage.getItem('modrinth_last_query');
        const savedVersion = localStorage.getItem('modrinth_last_version');
        if (savedQuery) {
            document.getElementById('searchInput').value = savedQuery;
            document.getElementById('versionInput').value = savedVersion || '';
            searchPlugins();
        }
        document.getElementById('searchBtn').onclick = searchPlugins;
        document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchPlugins(); });
        document.getElementById('versionInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchPlugins(); });
    });
</script>
{% endblock %}
